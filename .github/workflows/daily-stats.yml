name: Daily Stats Collection

on:
  schedule:
    - cron: '0 0 * * *'   # runs at 00:00 UTC every day (midnight)
  workflow_dispatch:       # allows manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  collect-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and record today's stats
        env:
          SCALER_AUTH: ${{ secrets.SCALER_AUTH }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python fetch_stats.py

      - name: Commit updated history
        run: |
          git config --global user.name  'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/history.json tokens.json || true
          git diff --staged --quiet || git commit -m "chore: update daily stats $(date -u +'%Y-%m-%d')"
          git push
